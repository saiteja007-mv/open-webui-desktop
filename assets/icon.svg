<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="128" cy="128" r="128" fill="url(#bg)"/>
  <!-- Glow ring -->
  <circle cx="128" cy="128" r="96" fill="url(#glow)"/>
  <!-- Outer ring -->
  <circle cx="128" cy="128" r="80" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.6"/>
  <!-- Middle ring -->
  <circle cx="128" cy="128" r="56" fill="#2563eb" opacity="0.5"/>
  <!-- Core -->
  <circle cx="128" cy="128" r="40" fill="#60a5fa"/>
  <!-- Eye / pupil -->
  <circle cx="128" cy="128" r="26" fill="white"/>
  <!-- Inner pupil -->
  <circle cx="128" cy="128" r="14" fill="#1e40af"/>
  <!-- Highlight -->
  <circle cx="120" cy="120" r="5" fill="white" opacity="0.7"/>
  <!-- Orbital dots -->
  <circle cx="128" cy="48" r="6" fill="#93c5fd"/>
  <circle cx="208" cy="128" r="6" fill="#93c5fd"/>
  <circle cx="128" cy="208" r="6" fill="#93c5fd"/>
  <circle cx="48" cy="128" r="6" fill="#93c5fd"/>
</svg>