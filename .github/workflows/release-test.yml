name: Cross-Platform Release Testing

on:
  release:
    types: [published, prereleased]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to test (e.g. v1.0.0)'
        required: false
        default: 'latest'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Fetch release assets & metadata
  # ─────────────────────────────────────────────
  get-release:
    name: 📦 Fetch Release Info
    runs-on: ubuntu-latest
    outputs:
      release_tag:    ${{ steps.release.outputs.tag }}
      windows_asset:  ${{ steps.assets.outputs.windows }}
      macos_x64_asset: ${{ steps.assets.outputs.macos_x64 }}
      linux_asset:    ${{ steps.assets.outputs.linux }}
    steps:
      - name: Get release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Testing release: $TAG"

      - name: List release assets
        id: assets
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = '${{ steps.release.outputs.tag }}';
            let release;

            if (tag === 'latest') {
              const r = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner, repo: context.repo.repo
              });
              release = r.data;
            } else {
              const r = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner, repo: context.repo.repo, tag
              });
              release = r.data;
            }

            const assets = release.assets;
            console.log('Available assets:', assets.map(a => a.name));

            // Windows: prefer Setup installer over portable
            const win = assets.find(a => a.name.match(/Setup.*\.exe$/i))
                     || assets.find(a => a.name.match(/\.exe$/i));

            // macOS: prefer x64 DMG (macos-latest runner is x64)
            const mac_x64 = assets.find(a =>
              a.name.match(/\.dmg$/i) && !a.name.includes('arm64')
            );

            // Linux: prefer .deb over AppImage
            const linux = assets.find(a => a.name.match(/\.deb$/i))
                       || assets.find(a => a.name.match(/\.AppImage$/i));

            core.setOutput('windows',   win      ? win.name      : '');
            core.setOutput('macos_x64', mac_x64  ? mac_x64.name  : '');
            core.setOutput('linux',     linux    ? linux.name    : '');

            console.log('Windows asset:',  win?.name      ?? 'NOT FOUND');
            console.log('macOS x64 asset:', mac_x64?.name ?? 'NOT FOUND');
            console.log('Linux asset:',    linux?.name    ?? 'NOT FOUND');

  # ─────────────────────────────────────────────
  # JOB 2: Windows — Install & Launch Testing
  # ─────────────────────────────────────────────
  test-windows:
    name: 🪟 Windows — Install & UI Test
    runs-on: windows-latest
    needs: get-release
    if: needs.get-release.outputs.windows_asset != ''
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Download Windows installer (via gh CLI — handles private repo auth)
        run: |
          gh release download "${{ needs.get-release.outputs.release_tag }}" `
            --repo "${{ github.repository }}" `
            --pattern "${{ needs.get-release.outputs.windows_asset }}" `
            --dir .
          $file = Get-ChildItem -Filter "*.exe" | Select-Object -First 1
          Rename-Item $file.FullName "installer.exe"
          Write-Host "Downloaded: $(Get-Item installer.exe | Select-Object -ExpandProperty Length) bytes"
        shell: pwsh

      - name: Verify installer integrity
        run: |
          $file = Get-Item "installer.exe"
          Write-Host "File size: $($file.Length) bytes"
          if ($file.Length -lt 10MB) {
            Write-Warning "Installer smaller than expected (< 10 MB) — may be incomplete"
          }
          $hash = Get-FileHash "installer.exe" -Algorithm SHA256
          Write-Host "SHA256: $($hash.Hash)"
        shell: pwsh

      - name: Install app silently
        run: |
          Start-Process -FilePath "installer.exe" -ArgumentList "/S" -Wait
          Start-Sleep -Seconds 10
          Write-Host "Installation complete"
        shell: pwsh
        continue-on-error: true

      - name: Verify app installed & find executable
        id: verify_install
        run: |
          $searchPaths = @(
            "$env:LOCALAPPDATA\Programs",
            "$env:PROGRAMFILES",
            "$env:PROGRAMFILES(X86)"
          )
          foreach ($base in $searchPaths) {
            $exes = Get-ChildItem -Path $base -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue |
                    Where-Object { $_.Name -notmatch "uninstall|update|squirrel" } |
                    Select-Object -First 3
            if ($exes) {
              Write-Host "Found in $base :"
              $exes | ForEach-Object { Write-Host "  $($_.FullName)" }
              echo "app_path=$($exes[0].FullName)" >> $env:GITHUB_OUTPUT
              break
            }
          }
        shell: pwsh
        continue-on-error: true

      - name: Launch app & check process
        run: |
          $appPath = "${{ steps.verify_install.outputs.app_path }}"
          if ($appPath -and (Test-Path $appPath)) {
            Write-Host "Launching: $appPath"
            $proc = Start-Process -FilePath $appPath -PassThru
            Start-Sleep -Seconds 8
            $running = Get-Process -Id $proc.Id -ErrorAction SilentlyContinue
            if ($running) {
              Write-Host "✅ App launched successfully (PID: $($proc.Id))"
              $proc | Stop-Process -Force
            } else {
              Write-Warning "⚠️  App process not found after launch"
            }
          } else {
            Write-Warning "App path not found — skipping launch test"
          }
        shell: pwsh
        continue-on-error: true

      - name: Screenshot desktop
        run: |
          Add-Type -AssemblyName System.Windows.Forms
          $screen   = [System.Windows.Forms.Screen]::PrimaryScreen
          $bitmap   = New-Object System.Drawing.Bitmap($screen.Bounds.Width, $screen.Bounds.Height)
          $graphics = [System.Drawing.Graphics]::FromImage($bitmap)
          $graphics.CopyFromScreen($screen.Bounds.Location, [System.Drawing.Point]::Empty, $screen.Bounds.Size)
          $bitmap.Save("screenshot-windows.png")
          Write-Host "Screenshot saved"
        shell: pwsh
        continue-on-error: true

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-test-results
          path: screenshot-windows.png
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 3: macOS — Install & Launch Testing
  # ─────────────────────────────────────────────
  test-macos:
    name: 🍎 macOS — Install & UI Test
    runs-on: macos-latest
    needs: get-release
    if: needs.get-release.outputs.macos_x64_asset != ''
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Download macOS DMG (via gh CLI — handles private repo auth)
        run: |
          gh release download "${{ needs.get-release.outputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "${{ needs.get-release.outputs.macos_x64_asset }}" \
            --dir .
          DMG=$(ls *.dmg | head -1)
          echo "INSTALLER=$DMG" >> $GITHUB_ENV
          echo "Downloaded: $DMG ($(du -sh "$DMG" | cut -f1))"

      - name: Verify DMG
        run: |
          ls -lh "$INSTALLER"
          hdiutil verify "$INSTALLER" 2>/dev/null && echo "✅ DMG verified" || echo "⚠️ Verify warning (non-fatal)"

      - name: Mount DMG and install app
        run: |
          # Mount to a fixed path to avoid spaces in volume name
          MOUNT_DIR="/tmp/dmg_mount"
          mkdir -p "$MOUNT_DIR"
          hdiutil attach "$INSTALLER" -nobrowse -quiet -mountpoint "$MOUNT_DIR"
          echo "Mounted at: $MOUNT_DIR"
          ls "$MOUNT_DIR"

          APP=$(find "$MOUNT_DIR" -name "*.app" -maxdepth 2 | head -1)
          if [ -n "$APP" ]; then
            echo "Found: $APP"
            cp -R "$APP" /Applications/
            APP_NAME=$(basename "$APP")
            echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
            echo "✅ Installed: $APP_NAME"
          else
            echo "⚠️ No .app found in DMG"
          fi

          hdiutil detach "$MOUNT_DIR" -quiet || true

      - name: Verify app bundle
        run: |
          APP_PATH="/Applications/$APP_NAME"
          if [ -d "$APP_PATH" ]; then
            echo "✅ Bundle exists: $APP_PATH"
            ls -la "$APP_PATH/Contents/" || true
            VER=$(defaults read "$APP_PATH/Contents/Info.plist" CFBundleShortVersionString 2>/dev/null || echo 'N/A')
            BID=$(defaults read "$APP_PATH/Contents/Info.plist" CFBundleIdentifier 2>/dev/null || echo 'N/A')
            echo "Version: $VER  |  Bundle ID: $BID"
          else
            echo "⚠️ App bundle not found at $APP_PATH"
          fi
        continue-on-error: true

      - name: Launch app & verify process
        run: |
          APP_PATH="/Applications/$APP_NAME"
          if [ -d "$APP_PATH" ]; then
            echo "Launching $APP_NAME..."
            open "$APP_PATH"
            sleep 8
            PROC=$(pgrep -f "Open WebUI" | head -1)
            if [ -n "$PROC" ]; then
              echo "✅ App running (PID: $PROC)"
              kill "$PROC" 2>/dev/null || true
            else
              echo "⚠️ App process not detected"
            fi
          fi
        continue-on-error: true

      - name: Capture screenshot
        run: screencapture -x screenshot-macos.png && echo "Screenshot captured" || true
        continue-on-error: true

      - name: Check crash reports
        run: |
          CRASH_DIR="$HOME/Library/Logs/DiagnosticReports"
          RECENT=$(find "$CRASH_DIR" -name "*.crash" -newer "$INSTALLER" 2>/dev/null || true)
          if [ -n "$RECENT" ]; then
            echo "⚠️ Crash reports found:"
            echo "$RECENT"
          else
            echo "✅ No crash reports"
          fi
        continue-on-error: true

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: macos-test-results
          path: screenshot-macos.png
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 4: Linux — Install & Launch Testing
  # ─────────────────────────────────────────────
  test-linux:
    name: 🐧 Linux — Install & UI Test
    runs-on: ubuntu-latest
    needs: get-release
    if: needs.get-release.outputs.linux_asset != ''
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Install display & testing deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            xvfb \
            x11-utils \
            scrot \
            libgtk-3-0 \
            libnotify4 \
            libnss3 \
            libxss1 \
            libxtst6 \
            xdg-utils \
            at-spi2-core \
            libatspi2.0-0 \
            libdrm2 \
            libgbm1 \
            libasound2t64

      - name: Download Linux package (via gh CLI — handles private repo auth)
        run: |
          gh release download "${{ needs.get-release.outputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "${{ needs.get-release.outputs.linux_asset }}" \
            --dir .
          INSTALLER=$(ls *.deb *.AppImage 2>/dev/null | head -1)
          echo "INSTALLER=$INSTALLER" >> $GITHUB_ENV
          echo "EXT=${INSTALLER##*.}" >> $GITHUB_ENV
          echo "Downloaded: $INSTALLER ($(du -sh "$INSTALLER" | cut -f1))"

      - name: Install package
        run: |
          case "$EXT" in
            AppImage)
              chmod +x "$INSTALLER"
              echo "APP_CMD=./$INSTALLER" >> $GITHUB_ENV
              echo "AppImage ready"
              ;;
            deb)
              sudo dpkg -i "$INSTALLER" || sudo apt-get install -f -y
              PKG=$(dpkg -f "$INSTALLER" Package 2>/dev/null)
              BIN=$(dpkg -L "$PKG" 2>/dev/null | grep -E '^/usr/(bin|local/bin)/' | head -1)
              echo "APP_CMD=${BIN:-open-webui-desktop}" >> $GITHUB_ENV
              echo "Installed: $PKG — binary: ${BIN:-open-webui-desktop}"
              ;;
          esac

      - name: Launch with virtual display & screenshot
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 &
          XVFB_PID=$!
          sleep 3
          echo "Xvfb started (PID: $XVFB_PID)"

          if [ -n "$APP_CMD" ]; then
            echo "Launching: $APP_CMD --no-sandbox"
            $APP_CMD --no-sandbox --disable-gpu 2>&1 &
            APP_PID=$!
            sleep 10

            if kill -0 $APP_PID 2>/dev/null; then
              echo "✅ App running (PID: $APP_PID)"
              sleep 3
              scrot screenshot-linux.png -d 1 || true
              echo "Screenshot captured"
              kill $APP_PID 2>/dev/null || true
            else
              echo "⚠️ App exited or failed to start"
            fi
          else
            echo "⚠️ No launch command — skipping"
          fi

          kill $XVFB_PID 2>/dev/null || true
        continue-on-error: true

      - name: Verify installed files
        run: |
          echo "=== /usr/bin ==="
          ls /usr/bin | grep -i webui || echo "(not found)"
          echo "=== /usr/share/applications ==="
          ls /usr/share/applications | grep -i webui || echo "(not found)"
          echo "=== /opt ==="
          ls /opt | grep -i webui || echo "(not found)"
        continue-on-error: true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-test-results
          path: screenshot-linux.png
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 5: Summary Report
  # ─────────────────────────────────────────────
  test-summary:
    name: 📊 Test Summary
    runs-on: ubuntu-latest
    needs: [get-release, test-windows, test-macos, test-linux]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: test-results
        continue-on-error: true

      - name: Generate summary report
        run: |
          TAG="${{ needs.get-release.outputs.release_tag }}"
          WIN="${{ needs.test-windows.result }}"
          MAC="${{ needs.test-macos.result }}"
          LIN="${{ needs.test-linux.result }}"

          icon() { case $1 in success) echo "✅";; failure) echo "❌";; skipped) echo "⏭️";; *) echo "❓";; esac; }

          {
            echo "# 🧪 Release Test Summary"
            echo ""
            echo "**Release:** \`${TAG}\`  |  **Triggered:** \`${{ github.event_name }}\`  |  **Date:** $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "## Platform Results"
            echo ""
            echo "| Platform | Result | Asset |"
            echo "|----------|--------|-------|"
            echo "| 🪟 Windows | $(icon $WIN) \`$WIN\` | \`${{ needs.get-release.outputs.windows_asset }}\` |"
            echo "| 🍎 macOS   | $(icon $MAC) \`$MAC\` | \`${{ needs.get-release.outputs.macos_x64_asset }}\` |"
            echo "| 🐧 Linux   | $(icon $LIN) \`$LIN\` | \`${{ needs.get-release.outputs.linux_asset }}\` |"
            echo ""
            echo "## Screenshots"
            echo "Available in the **Artifacts** section of this run (7-day retention)."
            echo ""
            echo "---"
            echo "_Automated testing via open-webui-desktop CI pipeline_"
          } >> $GITHUB_STEP_SUMMARY
